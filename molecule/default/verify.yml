- name: Verify vector role
  hosts: all
  become: true
  tasks:
    - name: Check vector binary exists
      stat:
        path: /usr/bin/vector
      register: vector_bin

    - name: Assert vector installed
      assert:
        that:
          - vector_bin.stat.exists

#    - name: Validate vector config
#      command: vector validate /etc/vector/vector.yaml
#      register: vector_validate
#      changed_when: false
#      failed_when: vector_validate.rc != 0
    - name: Check if vector config exists
      stat:
        path: /etc/vector/vector.yaml
      register: vector_config
#    - name: Check vector service
#      systemd:
#        name: vector
#      register: vector_service

    - name: Assert vector service running
#      assert:
#        that:
#          - vector_service.status.ActiveState == "active"
      stat:
        path: /etc/systemd/system/vector.service
      register: vector_service_file
      when: vector_manage_systemd_service | default(true)
